#Executive's Hardsuit
- type: entity
  parent: [ClothingOuterHardsuitBase, BaseCommandContraband]
  id: ClothingOuterHardsuitExecSOL
  name: solar legion executive's armored spacesuit
  description: A formal armored spacesuit, made for the station's executive.
  components:
  - type: Sprite
    sprite: _Persistence14/Clothing/OuterClothing/Hardsuits/execspace.rsi
  - type: Clothing
    sprite: _Persistence14/Clothing/OuterClothing/Hardsuits/execspace.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.02
    lowPressureMultiplier: 1000
  - type: ExplosionResistance
    damageCoefficient: 0.5
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.8
        Slash: 0.8
        Piercing: 0.6
        Heat: 0.5
        Radiation: 0.5
        Caustic: 0.6
  - type: ClothingSpeedModifier
    walkModifier: 0.8
    sprintModifier: 0.8
  - type: HeldSpeedModifier
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetHardsuitExecSOL
  - type: Tag
    tags:
    - Hardsuit
    - HighRiskItem
    - WhitelistChameleon

