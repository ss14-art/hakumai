#plasma windoor assemblies
- type: entity
  id: WindoorAssemblyPhoron
  name: phoron windoor assembly
  description: It opens, it closes, and you can see through it! It seems to be made out of money...
  parent: WindoorAssembly
  components:
  - type: Sprite
    sprite: Structures/Doors/Windoors/phoron.rsi
    layers:
    - state: assembly
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 360
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 1
            max: 2
          SheetPhoronGlass1:
            min: 1
            max: 3
  - type: Construction
    graph: Windoor
    node: phglass

- type: entity
  id: WindoorAssemblySecurePhoron
  name: secure phoron windoor assembly
  description: It opens, it closes, and you can see through it! It apears to be made of a lot of money...
  parent: WindoorAssembly
  components:
  - type: Sprite
    sprite: Structures/Doors/Windoors/phoron.rsi
    layers:
    - state: secure_underlay
    - state: assembly
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1200
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetPlasteel1:
            min: 1
            max: 2
          SheetRPhoronGlass1:
            min: 1
            max: 3
  - type: Construction
    graph: Windoor
    node: phglassSecure